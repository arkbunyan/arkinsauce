<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Triodle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-bar">
    <button id="reset-btn">Reset</button>
    <span id="streak-display">Streak: <span id="streak-count">0</span></span>
    <a href="index.html" class="mode-link">Fourdle</a>
  </div>

  <h1 id="title">Triodle</h1>
  <div id="board" style="--cols:3; --rows:7;"></div>

  <div id="message" class="message"></div>

  <div id="keyboard"></div>

  <h2 id="answer"></h2>
  <div id="translation-ui" class="hidden">
    <input type="text" id="lang-input" placeholder="e.g. German, Spanish">
    <button id="translate-btn">Translate</button>
    <p id="translation-result"></p>
  </div>

  <script src="triodle.js"></script>
</body>
</html>
