<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Triodle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-mode="triodle">
  <div id="auth">
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button id="login-btn">Log In</button>
    <button id="reg-btn">Sign Up</button>
    <button id="logout-btn" style="display:none">Log Out</button>
    <span>Streak: <span id="streak-count">0</span></span>
  </div>
  <div class="top-bar">
    <button id="reset-btn">Reset</button>
    <a href="index.html" class="mode-link">Fourdle</a>
  </div>

  <h1 id="title">Triodle</h1>
  <div id="board" style="--cols:3; --rows:7;"></div>

  <div id="message" class="message"></div>

  <div id="keyboard"></div>

  <h2 id="answer"></h2>
  <div id="translation-ui" class="hidden">
    <input type="text" id="lang-input" placeholder="e.g. German, Spanish">
    <button id="translate-btn">Translate</button>
    <p id="translation-result"></p>
  </div>

  <script src="game.js"></script>
</body>
</html>
